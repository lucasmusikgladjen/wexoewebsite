name: Sync schema → builder

# Speglar de kanoniska fält-schemana (wexoe-core/schema/*.json) till
# builder-repot automatiskt. Kör ENBART när ett schema ändras på main.
# Resultat: redigera en JSON i wexoe-core, pusha, och builderns kopia
# uppdaterar sig själv inom sekunder — ingen manuell handpaste.
on:
  push:
    branches: [main]
    paths:
      - 'wexoe-core/schema/**'
  workflow_dispatch: {}        # manuell "kör"-knapp i Actions-UI:t vid behov

# Default-token får bara läsa DETTA repo. Skrivning till builder-repot
# sker via App-token nedan.
permissions:
  contents: read

# Kör aldrig två synkar samtidigt (undvik krockande pushar).
concurrency:
  group: sync-schema
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. Hämta wexoeplugins (källan med de nya schema-filerna).
      - name: Checkout wexoeplugins
        uses: actions/checkout@v4

      # 2. Skapa en kortlivad nyckel som får skriva till builder-repot.
      #    Kräver en GitHub App (engångs-setup) — se .github/SCHEMA_SYNC_SETUP.md.
      - name: Mint cross-repo token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SCHEMA_SYNC_APP_ID }}
          private-key: ${{ secrets.SCHEMA_SYNC_APP_PRIVATE_KEY }}
          owner: lucasmusikgladjen
          repositories: wexoebuilder

      # 3. Hämta builder-repot (dit kopian ska) till mappen "builder/".
      - name: Checkout wexoebuilder
        uses: actions/checkout@v4
        with:
          repository: lucasmusikgladjen/wexoebuilder
          token: ${{ steps.app.outputs.token }}
          path: builder
          ref: main

      # 4. Spegla bara *.json. README.md i builder/schema/ skyddas
      #    (exkluderas → --delete rör den inte).
      - name: Mirror schema JSON
        run: |
          mkdir -p builder/schema
          rsync -a --delete --include='*.json' --exclude='*' \
            wexoe-core/schema/ builder/schema/

      # 5. Committa + pusha till builderns main ENDAST om något ändrats.
      #    Direkt-push = går live av sig självt (om buildern auto-deployar
      #    på push). changed-flaggan styr deploy-hooken i steg 6.
      - name: Commit & push if changed
        id: push
        working-directory: builder
        run: |
          git add -A schema/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Inga schema-ändringar att spegla."
            exit 0
          fi
          git config user.name  "wexoe-schema-bot"
          git config user.email "wexoe-schema-bot@users.noreply.github.com"
          git commit -m "chore(schema): sync från wexoe-core@${GITHUB_SHA::7}"
          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # 6. Om buildern INTE auto-deployar på push: lägg en deploy-hook-URL
      #    i secret BUILDER_DEPLOY_HOOK så triggas ett nytt bygge här.
      #    Saknas secret:en hoppas steget tyst över.
      - name: Trigger builder deploy
        if: ${{ steps.push.outputs.changed == 'true' && env.HOOK != '' }}
        env:
          HOOK: ${{ secrets.BUILDER_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$HOOK"
